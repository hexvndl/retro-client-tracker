<header>RETRO CLIENT TRACKER v1.0</header>

<div class="container">

<button id="addClient">+ Add Client</button>
<select id="yearSelect"></select>
<button id="exportData">Export Backup</button>
<button id="importData">Import Backup</button>
<input type="file" id="fileInput" style="display:none">

<div class="table-wrapper">
<table>
<thead id="tableHead"></thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<footer>Max 50 Clients • 2 Year History • Offline</footer>

</div>

<script>
"use strict";

/* ================================
   CONFIGURATION
================================ */

const STORAGE_KEY = "retro_client_tracker_v1";
const MAX_CLIENTS = 50;

const CURRENT_YEAR = new Date().getFullYear();
const PREVIOUS_YEAR = CURRENT_YEAR - 1;

/* ================================
   STATE MANAGEMENT
================================ */

let state = {
  clients: []
};

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    state = JSON.parse(raw);
  }
}

function saveState() {
  pruneYears();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function pruneYears() {
  state.clients.forEach(client => {
    Object.keys(client.payments).forEach(year => {
      if (year != CURRENT_YEAR && year != PREVIOUS_YEAR) {
        delete client.payments[year];
      }
    });
  });
}

/* ================================
   UI INITIALIZATION
================================ */

const yearSelect = document.getElementById("yearSelect");

function initYearSelector() {
  [PREVIOUS_YEAR, CURRENT_YEAR].forEach(year => {
    const opt = document.createElement("option");
    opt.value = year;
    opt.textContent = year;
    yearSelect.appendChild(opt);
  });
}

yearSelect.addEventListener("change", renderTable);

/* ================================
   CLIENT MANAGEMENT
================================ */

document.getElementById("addClient").addEventListener("click", () => {

  if (state.clients.length >= MAX_CLIENTS) {
    alert("Maximum 50 clients reached.");
    return;
  }

  const name = prompt("Client Name:");
  const fee = parseFloat(prompt("Monthly Fee:"));

  if (!name || isNaN(fee)) return;

  const client = {
    id: crypto.randomUUID(),
    name: name.trim(),
    fee,
    payments: {}
  };

  state.clients.push(client);
  saveState();
  renderTable();
});
